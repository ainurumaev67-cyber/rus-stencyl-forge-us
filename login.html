<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Вход — RUS Stencyl Forge</title>
    <meta name="description" content="Войдите в аккаунт RUS Stencyl Forge, чтобы публиковать свои ресурсы для Stencyl 4.0.4.">
    <meta name="theme-color" content="#2563eb">
    <meta name="color-scheme" content="light">

    <!-- Шрифты: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>

    <style>
        /* ==================== ПЕРЕМЕННЫЕ ==================== */
        :root {
            --color-bg: #f8fafc;
            --color-surface: #ffffff;
            --color-text: #0f172a;
            --color-text-secondary: #475569;
            --color-text-tertiary: #94a3b8;
            --color-text-inverse: #ffffff;
            --color-accent: #2563eb;
            --color-accent-hover: #1d4ed8;
            --color-accent-pressed: #1e40af;
            --color-accent-light: #eff6ff;
            --color-accent-ring: rgba(37, 99, 235, 0.15);
            --color-success: #10b981;
            --color-success-light: #ecfdf5;
            --color-error: #ef4444;
            --color-error-light: #fef2f2;
            --color-warning: #f59e0b;
            --color-warning-light: #fffbeb;
            --color-border: #e2e8f0;
            --color-border-light: #f1f5f9;
            --color-border-hover: #cbd5e1;
            --radius-xs: 6px;
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-full: 9999px;
            --shadow-xs: 0 1px 2px rgba(0,0,0,0.03);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.03);
            --shadow-lg: 0 12px 32px rgba(0,0,0,0.08);
            --shadow-accent: 0 4px 14px rgba(37,99,235,0.25);
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-size-xs: 0.75rem;
            --font-size-sm: 0.8125rem;
            --font-size-base: 0.875rem;
            --font-size-md: 0.9375rem;
            --font-size-lg: 1.0625rem;
            --font-size-xl: 1.25rem;
            --font-size-2xl: 1.5rem;
            --font-size-3xl: 1.875rem;
            --line-height-tight: 1.25;
            --line-height-normal: 1.5;
            --line-height-relaxed: 1.625;
            --letter-spacing-tight: -0.02em;
            --letter-spacing-normal: -0.01em;
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-normal: 250ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 350ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ==================== СБРОС ==================== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html {
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
            scroll-behavior: smooth;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: var(--font-family);
            font-size: var(--font-size-base);
            line-height: var(--line-height-normal);
            background-color: var(--color-bg);
            color: var(--color-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            letter-spacing: var(--letter-spacing-normal);
        }
        ::selection {
            background-color: var(--color-accent);
            color: var(--color-text-inverse);
        }
        :focus-visible {
            outline: 2px solid var(--color-accent);
            outline-offset: 2px;
            border-radius: var(--radius-xs);
        }

        /* ==================== КАРТОЧКА ФОРМЫ ==================== */
        .auth-card {
            width: 100%;
            max-width: 440px;
            background-color: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            padding: 40px 32px;
            animation: cardIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(20px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ==================== ЛОГОТИП ==================== */
        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 32px;
            text-decoration: none;
            color: var(--color-text);
        }
        .auth-logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.4rem;
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
        }
        .auth-logo-text {
            font-weight: 700;
            font-size: var(--font-size-xl);
            letter-spacing: var(--letter-spacing-tight);
        }

        /* ==================== ЗАГОЛОВОК ==================== */
        .auth-title {
            text-align: center;
            font-size: var(--font-size-2xl);
            font-weight: 700;
            letter-spacing: var(--letter-spacing-tight);
            margin-bottom: 6px;
        }
        .auth-subtitle {
            text-align: center;
            color: var(--color-text-secondary);
            font-size: var(--font-size-base);
            margin-bottom: 28px;
            line-height: var(--line-height-relaxed);
        }

        /* ==================== ПОЛЯ ВВОДА ==================== */
        .form-group {
            margin-bottom: 18px;
        }
        .form-label {
            display: block;
            font-weight: 600;
            font-size: var(--font-size-sm);
            margin-bottom: 6px;
            color: var(--color-text);
            letter-spacing: 0.01em;
        }
        .form-input-wrapper {
            position: relative;
        }
        .form-input {
            width: 100%;
            padding: 13px 16px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            font-size: var(--font-size-base);
            font-family: inherit;
            background-color: var(--color-bg);
            color: var(--color-text);
            transition: all var(--transition-fast);
            letter-spacing: var(--letter-spacing-normal);
            box-shadow: var(--shadow-xs);
        }
        .form-input::placeholder {
            color: var(--color-text-tertiary);
            font-weight: 400;
        }
        .form-input:hover {
            border-color: var(--color-border-hover);
        }
        .form-input:focus {
            outline: none;
            border-color: var(--color-accent);
            box-shadow: 0 0 0 4px var(--color-accent-ring);
            background-color: var(--color-surface);
        }
        .form-input.error {
            border-color: var(--color-error);
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
        }
        .form-input.success {
            border-color: var(--color-success);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        /* Иконка показать/скрыть пароль */
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 6px;
            border-radius: var(--radius-xs);
            color: var(--color-text-tertiary);
            transition: all var(--transition-fast);
            line-height: 1;
        }
        .password-toggle:hover {
            color: var(--color-text);
            background-color: var(--color-border-light);
        }

        /* ==================== КНОПКА ==================== */
        .btn-primary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 14px 24px;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: var(--font-size-md);
            cursor: pointer;
            border: none;
            background-color: var(--color-accent);
            color: var(--color-text-inverse);
            font-family: inherit;
            transition: all var(--transition-fast);
            box-shadow: var(--shadow-accent);
            letter-spacing: 0.01em;
            margin-top: 6px;
        }
        .btn-primary:hover {
            background-color: var(--color-accent-hover);
            box-shadow: var(--shadow-lg);
        }
        .btn-primary:active {
            background-color: var(--color-accent-pressed);
            transform: scale(0.98);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* ==================== СООБЩЕНИЯ ОБ ОШИБКАХ ==================== */
        .alert {
            padding: 14px 18px;
            border-radius: var(--radius);
            font-size: var(--font-size-sm);
            font-weight: 500;
            margin-bottom: 20px;
            display: none;
            animation: alertIn 0.3s ease;
            line-height: var(--line-height-relaxed);
        }
        .alert.visible {
            display: block;
        }
        @keyframes alertIn {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .alert-error {
            background-color: var(--color-error-light);
            color: var(--color-error);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .alert-success {
            background-color: var(--color-success-light);
            color: var(--color-success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .alert-info {
            background-color: var(--color-accent-light);
            color: var(--color-accent);
            border: 1px solid rgba(37, 99, 235, 0.15);
        }

        /* ==================== ПЕРЕКЛЮЧАТЕЛЬ РЕЖИМА ==================== */
        .auth-switch {
            text-align: center;
            margin-top: 24px;
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
        }
        .auth-switch a {
            color: var(--color-accent);
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: color var(--transition-fast);
        }
        .auth-switch a:hover {
            color: var(--color-accent-hover);
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        /* ==================== РАЗДЕЛИТЕЛЬ ==================== */
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 20px 0;
            color: var(--color-text-tertiary);
            font-size: var(--font-size-xs);
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: var(--color-border);
        }

        /* ==================== ССЫЛКА НАЗАД ==================== */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--color-text-secondary);
            text-decoration: none;
            font-size: var(--font-size-sm);
            font-weight: 500;
            margin-bottom: 24px;
            transition: color var(--transition-fast);
        }
        .back-link:hover {
            color: var(--color-accent);
        }

        /* ==================== АДАПТИВ ==================== */
        @media (max-width: 480px) {
            .auth-card {
                padding: 28px 20px;
            }
            .auth-title {
                font-size: var(--font-size-xl);
            }
            body {
                padding: 16px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== КАРТОЧКА ВХОДА ==================== -->
    <div class="auth-card" role="main" aria-labelledby="authTitle">

        <!-- Логотип -->
        <a href="index.html" class="auth-logo" aria-label="RUS Stencyl Forge — на главную">
            <span class="auth-logo-icon" aria-hidden="true">🧩</span>
            <span class="auth-logo-text">Stencyl Forge</span>
        </a>

        <!-- Заголовок -->
        <h1 class="auth-title" id="authTitle">Вход</h1>
        <p class="auth-subtitle" id="authSubtitle">Войдите в аккаунт, чтобы публиковать ресурсы</p>

        <!-- Сообщения (ошибки/успех) -->
        <div class="alert" id="alertBox" role="alert" aria-live="polite"></div>

        <!-- Форма -->
        <form id="authForm" novalidate autocomplete="on">

            <!-- Имя (только при регистрации) -->
            <div class="form-group" id="groupDisplayName" style="display:none;">
                <label class="form-label" for="displayName">👤 Имя</label>
                <div class="form-input-wrapper">
                    <input 
                        type="text" 
                        class="form-input" 
                        id="displayName" 
                        placeholder="Как вас зовут?"
                        autocomplete="name"
                        maxlength="50"
                    >
                </div>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label class="form-label" for="email">📧 Email</label>
                <div class="form-input-wrapper">
                    <input 
                        type="email" 
                        class="form-input" 
                        id="email" 
                        placeholder="you@example.com"
                        autocomplete="email"
                        required
                    >
                </div>
            </div>

            <!-- Пароль -->
            <div class="form-group">
                <label class="form-label" for="password">🔒 Пароль</label>
                <div class="form-input-wrapper">
                    <input 
                        type="password" 
                        class="form-input" 
                        id="password" 
                        placeholder="Минимум 6 символов"
                        autocomplete="current-password"
                        required
                        minlength="6"
                    >
                    <button 
                        type="button" 
                        class="password-toggle" 
                        id="togglePassword" 
                        aria-label="Показать пароль"
                        title="Показать пароль"
                    >👁️</button>
                </div>
            </div>

            <!-- Кнопка -->
            <button type="submit" class="btn-primary" id="submitBtn">
                Войти
            </button>
        </form>

        <!-- Переключатель Вход / Регистрация -->
        <p class="auth-switch" id="switchText">
            Нет аккаунта? <a id="switchLink">Зарегистрироваться</a>
        </p>
    </div>

    <script>
        // ==================== СОСТОЯНИЕ ====================
        let isLoginMode = true;

        // ==================== ЭЛЕМЕНТЫ DOM ====================
        const authForm = document.getElementById('authForm');
        const authTitle = document.getElementById('authTitle');
        const authSubtitle = document.getElementById('authSubtitle');
        const submitBtn = document.getElementById('submitBtn');
        const switchLink = document.getElementById('switchLink');
        const switchText = document.getElementById('switchText');
        const alertBox = document.getElementById('alertBox');
        const groupDisplayName = document.getElementById('groupDisplayName');
        const displayNameInput = document.getElementById('displayName');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('togglePassword');

        // ==================== ПЕРЕКЛЮЧЕНИЕ РЕЖИМОВ ====================
        function setMode(loginMode) {
            isLoginMode = loginMode;
            
            if (loginMode) {
                authTitle.textContent = 'Вход';
                authSubtitle.textContent = 'Войдите в аккаунт, чтобы публиковать ресурсы';
                submitBtn.textContent = '🚀 Войти';
                switchText.innerHTML = 'Нет аккаунта? <a id="switchLink">Зарегистрироваться</a>';
                groupDisplayName.style.display = 'none';
                displayNameInput.required = false;
                passwordInput.autocomplete = 'current-password';
                // Пересоздаём ссылку переключения
                document.getElementById('switchLink').addEventListener('click', () => setMode(false));
            } else {
                authTitle.textContent = 'Регистрация';
                authSubtitle.textContent = 'Создайте аккаунт и делитесь ресурсами';
                submitBtn.textContent = '✨ Зарегистрироваться';
                switchText.innerHTML = 'Уже есть аккаунт? <a id="switchLink">Войти</a>';
                groupDisplayName.style.display = 'block';
                displayNameInput.required = true;
                passwordInput.autocomplete = 'new-password';
                // Пересоздаём ссылку переключения
                document.getElementById('switchLink').addEventListener('click', () => setMode(true));
            }
            
            hideAlert();
            clearErrors();
            authForm.reset();
        }

        // Инициализация ссылки
        switchLink.addEventListener('click', () => setMode(false));

        // ==================== ПОКАЗАТЬ/СКРЫТЬ ПАРОЛЬ ====================
        togglePasswordBtn.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            togglePasswordBtn.textContent = isPassword ? '🙈' : '👁️';
            togglePasswordBtn.setAttribute('aria-label', isPassword ? 'Скрыть пароль' : 'Показать пароль');
        });

        // ==================== АЛЕРТЫ ====================
        function showAlert(message, type = 'error') {
            alertBox.textContent = message;
            alertBox.className = `alert alert-${type} visible`;
        }

        function hideAlert() {
            alertBox.className = 'alert';
            alertBox.textContent = '';
        }

        // ==================== ОШИБКИ ПОЛЕЙ ====================
        function clearErrors() {
            [emailInput, passwordInput, displayNameInput].forEach(input => {
                if (input) input.classList.remove('error', 'success');
            });
        }

        function setFieldError(input, hasError) {
            if (hasError) {
                input.classList.add('error');
                input.classList.remove('success');
            } else {
                input.classList.remove('error');
                input.classList.add('success');
            }
        }

        // ==================== ВАЛИДАЦИЯ ====================
        function validateForm() {
            let isValid = true;
            clearErrors();

            // Email
            const email = emailInput.value.trim();
            if (!email) {
                setFieldError(emailInput, true);
                showAlert('Введите email.', 'error');
                isValid = false;
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                setFieldError(emailInput, true);
                showAlert('Неверный формат email.', 'error');
                isValid = false;
            } else {
                setFieldError(emailInput, false);
            }

            // Пароль
            const password = passwordInput.value;
            if (!password) {
                setFieldError(passwordInput, true);
                showAlert('Введите пароль.', 'error');
                isValid = false;
            } else if (password.length < 6) {
                setFieldError(passwordInput, true);
                showAlert('Пароль должен быть не менее 6 символов.', 'error');
                isValid = false;
            } else {
                setFieldError(passwordInput, false);
            }

            // Имя (только при регистрации)
            if (!isLoginMode) {
                const name = displayNameInput.value.trim();
                if (!name) {
                    setFieldError(displayNameInput, true);
                    showAlert('Введите ваше имя.', 'error');
                    isValid = false;
                } else if (name.length < 2) {
                    setFieldError(displayNameInput, true);
                    showAlert('Имя должно быть не менее 2 символов.', 'error');
                    isValid = false;
                } else {
                    setFieldError(displayNameInput, false);
                }
            }

            return isValid;
        }

        // ==================== ОТПРАВКА ФОРМЫ ====================
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();

            if (!validateForm()) return;

            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const displayName = isLoginMode ? null : displayNameInput.value.trim();

            // Блокируем кнопку
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Подождите...';

            try {
                if (isLoginMode) {
                    // ВХОД
                    const userCredential = await auth.signInWithEmailAndPassword(email, password);
                    const user = userCredential.user;
                    
                    showAlert(`✅ Добро пожаловать, ${user.displayName || user.email}!`, 'success');
                    
                    // Перенаправление на главную через 1 секунду
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);

                } else {
                    // РЕГИСТРАЦИЯ
                    const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                    const user = userCredential.user;

                    // Обновляем профиль (добавляем имя)
                    await user.updateProfile({
                        displayName: displayName
                    });

                    showAlert('✅ Аккаунт создан! Перенаправляем...', 'success');
                    
                    // Перенаправление на главную через 1.5 секунды
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                }

            } catch (error) {
                console.error('Ошибка аутентификации:', error);
                
                // Понятные сообщения для разных ошибок
                let message = 'Произошла ошибка. Попробуйте ещё раз.';
                
                switch (error.code) {
                    case 'auth/user-not-found':
                        message = 'Пользователь с таким email не найден. Проверьте email или зарегистрируйтесь.';
                        setFieldError(emailInput, true);
                        break;
                    case 'auth/wrong-password':
                        message = 'Неверный пароль. Попробуйте ещё раз.';
                        setFieldError(passwordInput, true);
                        break;
                    case 'auth/invalid-email':
                        message = 'Неверный формат email.';
                        setFieldError(emailInput, true);
                        break;
                    case 'auth/email-already-in-use':
                        message = 'Этот email уже используется. Войдите или используйте другой.';
                        setFieldError(emailInput, true);
                        break;
                    case 'auth/weak-password':
                        message = 'Слишком слабый пароль. Используйте не менее 6 символов.';
                        setFieldError(passwordInput, true);
                        break;
                    case 'auth/too-many-requests':
                        message = 'Слишком много попыток. Подождите минуту и попробуйте снова.';
                        break;
                    case 'auth/network-request-failed':
                        message = 'Проблема с сетью. Проверьте интернет-соединение.';
                        break;
                    default:
                        message = `Ошибка: ${error.message}`;
                }
                
                showAlert(message, 'error');
            } finally {
                // Разблокируем кнопку
                submitBtn.disabled = false;
                submitBtn.textContent = isLoginMode ? '🚀 Войти' : '✨ Зарегистрироваться';
            }
        });

        // ==================== ПРОВЕРКА АВТОРИЗАЦИИ ====================
        auth.onAuthStateChanged((user) => {
            if (user && window.location.pathname.includes('login.html')) {
                // Пользователь уже вошёл — перенаправляем на главную
                window.location.href = 'index.html';
            }
        });

        // ==================== ФОКУС НА ПЕРВОМ ПОЛЕ ====================
        emailInput.focus();
    </script>

</body>
</html>
