<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>RUS Stencyl Forge — Каталог ресурсов</title>
    <meta name="description" content="Каталог бесплатных ресурсов для Stencyl 4.0.4: актёры, тайлсеты, поведения, проекты от русскоязычного сообщества.">
    <meta name="theme-color" content="#2563eb">
    <meta name="color-scheme" content="light">

    <!-- Шрифты: Inter (современный, читаемый, кириллица) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">

    <!-- Firebase SDK (Compat для простоты) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>

    <style>
        /* ==================== CSS-ПЕРЕМЕННЫЕ ==================== */
        :root {
            /* Основная палитра */
            --color-bg: #f8fafc;
            --color-surface: #ffffff;
            --color-overlay: rgba(0, 0, 0, 0.4);

            /* Текст */
            --color-text: #0f172a;
            --color-text-secondary: #475569;
            --color-text-tertiary: #94a3b8;
            --color-text-inverse: #ffffff;

            /* Акцент */
            --color-accent: #2563eb;
            --color-accent-hover: #1d4ed8;
            --color-accent-pressed: #1e40af;
            --color-accent-light: #eff6ff;
            --color-accent-ring: rgba(37, 99, 235, 0.15);

            /* Семантические цвета */
            --color-success: #10b981;
            --color-success-light: #ecfdf5;
            --color-warning: #f59e0b;
            --color-warning-light: #fffbeb;
            --color-error: #ef4444;
            --color-error-light: #fef2f2;

            /* Границы */
            --color-border: #e2e8f0;
            --color-border-light: #f1f5f9;
            --color-border-hover: #cbd5e1;

            /* Скругления */
            --radius-xs: 6px;
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-full: 9999px;

            /* Тени (уровни возвышения) */
            --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.03);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.03);
            --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.08), 0 2px 4px rgba(0, 0, 0, 0.03);
            --shadow-xl: 0 20px 48px rgba(0, 0, 0, 0.12);
            --shadow-accent: 0 4px 14px rgba(37, 99, 235, 0.25);

            /* Типографика */
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            --font-size-xs: 0.75rem;    /* 12px */
            --font-size-sm: 0.8125rem;  /* 13px */
            --font-size-base: 0.875rem; /* 14px */
            --font-size-md: 0.9375rem;  /* 15px */
            --font-size-lg: 1.0625rem;  /* 17px */
            --font-size-xl: 1.25rem;    /* 20px */
            --font-size-2xl: 1.5rem;    /* 24px */
            --font-size-3xl: 1.875rem;  /* 30px */
            --line-height-tight: 1.25;
            --line-height-normal: 1.5;
            --line-height-relaxed: 1.625;
            --letter-spacing-tight: -0.02em;
            --letter-spacing-normal: -0.01em;
            --letter-spacing-wide: 0.02em;

            /* Анимации */
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-normal: 250ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 350ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-spring: 400ms cubic-bezier(0.34, 1.56, 0.64, 1);

            /* Размеры */
            --header-height: 64px;
            --container-max: 1280px;
            --card-min-width: 280px;
        }

        /* ==================== СБРОС ==================== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
            scroll-behavior: smooth;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-family);
            font-size: var(--font-size-base);
            line-height: var(--line-height-normal);
            background-color: var(--color-bg);
            color: var(--color-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            letter-spacing: var(--letter-spacing-normal);
        }

        /* Выделение текста */
        ::selection {
            background-color: var(--color-accent);
            color: var(--color-text-inverse);
        }

        /* Фокус для доступности */
        :focus-visible {
            outline: 2px solid var(--color-accent);
            outline-offset: 2px;
            border-radius: var(--radius-xs);
        }

        /* ==================== СВОЙ СКРОЛЛБАР ==================== */
        @media (hover: hover) {
            ::-webkit-scrollbar {
                width: 6px;
                height: 6px;
            }
            ::-webkit-scrollbar-track {
                background-color: transparent;
            }
            ::-webkit-scrollbar-thumb {
                background-color: #cbd5e1;
                border-radius: 3px;
                transition: background-color var(--transition-fast);
            }
            ::-webkit-scrollbar-thumb:hover {
                background-color: #94a3b8;
            }
            ::-webkit-scrollbar-corner {
                background-color: transparent;
            }
        }

        /* Скрытый скроллбар для контейнеров с прокруткой */
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* ==================== ШАПКА ==================== */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: rgba(255, 255, 255, 0.92);
            border-bottom: 1px solid var(--color-border);
            backdrop-filter: saturate(180%) blur(16px);
            -webkit-backdrop-filter: saturate(180%) blur(16px);
            height: var(--header-height);
            transition: box-shadow var(--transition-normal);
        }

        /* Тень при прокрутке (добавляется через JS) */
        .header.scrolled {
            box-shadow: var(--shadow-md);
        }

        .header-inner {
            max-width: var(--container-max);
            margin: 0 auto;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            gap: 16px;
        }

        /* Логотип */
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--color-text);
            flex-shrink: 0;
            border-radius: var(--radius-sm);
            padding: 4px;
            transition: opacity var(--transition-fast);
        }
        .logo:hover {
            opacity: 0.8;
        }
        .logo:focus-visible {
            outline-offset: 0;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
            transition: transform var(--transition-fast);
        }
        .logo:hover .logo-icon {
            transform: scale(1.05);
        }

        .logo-text {
            display: flex;
            flex-direction: column;
            line-height: var(--line-height-tight);
        }
        .logo-title {
            font-weight: 700;
            font-size: var(--font-size-lg);
            letter-spacing: var(--letter-spacing-tight);
            color: var(--color-text);
        }
        .logo-badge {
            font-size: 0.625rem;
            font-weight: 600;
            color: var(--color-accent);
            background-color: var(--color-accent-light);
            padding: 2px 8px;
            border-radius: var(--radius-full);
            letter-spacing: var(--letter-spacing-wide);
            text-transform: uppercase;
            width: fit-content;
        }

        /* Навигация */
        .nav {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: var(--radius-full);
            text-decoration: none;
            font-weight: 500;
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
            transition: all var(--transition-fast);
            border: 1px solid transparent;
            background-color: transparent;
            font-family: inherit;
            cursor: pointer;
            white-space: nowrap;
            user-select: none;
            -webkit-user-select: none;
            position: relative;
        }
        .nav-link:hover {
            background-color: var(--color-border-light);
            color: var(--color-text);
        }
        .nav-link:active {
            transform: scale(0.97);
        }
        .nav-link.active {
            background-color: var(--color-accent);
            color: var(--color-text-inverse);
            font-weight: 600;
            box-shadow: var(--shadow-accent);
        }
        .nav-link.active:hover {
            background-color: var(--color-accent-hover);
        }
        .nav-link.accent {
            background-color: var(--color-success);
            color: var(--color-text-inverse);
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
        }
        .nav-link.accent:hover {
            background-color: #059669;
        }

        /* Кнопка входа */
        .btn-login {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border-radius: var(--radius-full);
            font-weight: 600;
            font-size: var(--font-size-sm);
            cursor: pointer;
            border: 1px solid var(--color-border);
            background-color: var(--color-surface);
            color: var(--color-text);
            font-family: inherit;
            transition: all var(--transition-fast);
            white-space: nowrap;
            user-select: none;
            -webkit-user-select: none;
        }
        .btn-login:hover {
            background-color: var(--color-accent-light);
            border-color: var(--color-accent);
            color: var(--color-accent);
            box-shadow: var(--shadow-xs);
        }
        .btn-login:active {
            transform: scale(0.97);
            background-color: #dbeafe;
        }
        .btn-login.logged-in {
            background-color: var(--color-accent-light);
            border-color: var(--color-accent);
            color: var(--color-accent);
        }

        .user-dot {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.7rem;
            letter-spacing: 0.04em;
            flex-shrink: 0;
        }

        /* ==================== ОСНОВНОЙ КОНТЕНТ ==================== */
        .main {
            flex: 1;
            padding: 36px 20px 56px;
        }
        .container {
            max-width: var(--container-max);
            margin: 0 auto;
            width: 100%;
        }

        /* Заголовок страницы */
        .page-header {
            margin-bottom: 28px;
        }
        .page-title {
            font-size: var(--font-size-3xl);
            font-weight: 700;
            letter-spacing: var(--letter-spacing-tight);
            color: var(--color-text);
            margin-bottom: 6px;
            line-height: var(--line-height-tight);
        }
        .page-subtitle {
            color: var(--color-text-secondary);
            font-size: var(--font-size-md);
            line-height: var(--line-height-relaxed);
            max-width: 600px;
        }

        /* Поисковая строка */
        .search-wrapper {
            position: relative;
            max-width: 440px;
            margin-bottom: 22px;
        }
        .search-input {
            width: 100%;
            padding: 13px 18px 13px 46px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-full);
            font-size: var(--font-size-base);
            font-family: inherit;
            background-color: var(--color-surface);
            color: var(--color-text);
            transition: all var(--transition-fast);
            box-shadow: var(--shadow-xs);
            letter-spacing: var(--letter-spacing-normal);
        }
        .search-input::placeholder {
            color: var(--color-text-tertiary);
            font-weight: 400;
        }
        .search-input:hover {
            border-color: var(--color-border-hover);
        }
        .search-input:focus {
            outline: none;
            border-color: var(--color-accent);
            box-shadow: 0 0 0 4px var(--color-accent-ring);
            background-color: var(--color-surface);
        }
        .search-input:focus::placeholder {
            opacity: 0.6;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            pointer-events: none;
            opacity: 0.45;
            transition: opacity var(--transition-fast);
        }
        .search-input:focus ~ .search-icon {
            opacity: 0.8;
            color: var(--color-accent);
        }

        /* Обёртка фильтров */
        .filters-wrapper {
            position: relative;
            margin-bottom: 28px;
        }

        /* Контейнер с прокруткой */
        .filters-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scroll-behavior: smooth;
            padding: 6px 2px 10px;
        }

        /* Чипсы фильтров */
        .filter-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            border-radius: var(--radius-full);
            font-weight: 500;
            font-size: var(--font-size-sm);
            cursor: pointer;
            transition: all var(--transition-fast);
            border: 1px solid var(--color-border);
            background-color: var(--color-surface);
            color: var(--color-text-secondary);
            font-family: inherit;
            white-space: nowrap;
            flex-shrink: 0;
            user-select: none;
            -webkit-user-select: none;
            box-shadow: var(--shadow-xs);
            letter-spacing: 0.01em;
        }
        .filter-chip:hover {
            background-color: var(--color-border-light);
            color: var(--color-text);
            border-color: var(--color-border-hover);
            box-shadow: var(--shadow-sm);
        }
        .filter-chip:active {
            transform: scale(0.96);
            transition: transform 0.1s ease;
        }
        .filter-chip.active {
            background-color: var(--color-accent);
            color: var(--color-text-inverse);
            border-color: var(--color-accent);
            font-weight: 600;
            box-shadow: var(--shadow-accent);
        }
        .filter-chip.active:hover {
            background-color: var(--color-accent-hover);
        }

        .filter-count {
            font-size: var(--font-size-xs);
            opacity: 0.7;
            font-weight: 500;
            min-width: 18px;
            text-align: center;
            background-color: rgba(0, 0, 0, 0.06);
            padding: 2px 8px;
            border-radius: var(--radius-full);
            transition: all var(--transition-fast);
        }
        .filter-chip.active .filter-count {
            background-color: rgba(255, 255, 255, 0.2);
            opacity: 1;
        }

        /* Стрелки прокрутки */
        .scroll-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--color-surface);
            border: 1px solid var(--color-border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            z-index: 10;
            transition: all var(--transition-fast);
            box-shadow: var(--shadow-md);
            opacity: 0;
            pointer-events: none;
            color: var(--color-text-secondary);
            font-weight: 600;
        }
        .scroll-arrow.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .scroll-arrow:hover {
            background-color: var(--color-border-light);
            border-color: var(--color-border-hover);
            box-shadow: var(--shadow-lg);
            color: var(--color-text);
        }
        .scroll-arrow:active {
            transform: translateY(-50%) scale(0.92);
        }
        .scroll-arrow.left {
            left: -16px;
        }
        .scroll-arrow.right {
            right: -16px;
        }

        /* ==================== СЕТКА КАТАЛОГА ==================== */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(var(--card-min-width), 1fr));
            gap: 20px;
        }

        /* ==================== КАРТОЧКА УСТАНОВКИ STENCYL ==================== */
        .stencyl-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #334155;
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all var(--transition-slow);
            box-shadow: var(--shadow-md);
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            position: relative;
            animation: cardFadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) backwards;
            animation-delay: 0.02s;
        }
        .stencyl-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.3);
            border-color: #475569;
        }
        .stencyl-card:active {
            transform: translateY(-2px);
        }

        /* Декоративные элементы */
        .stencyl-card::before {
            content: '';
            position: absolute;
            top: -30px;
            right: -30px;
            width: 140px;
            height: 140px;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.4) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .stencyl-card::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: -20px;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .stencyl-card-image {
            width: 100%;
            aspect-ratio: 16 / 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            position: relative;
            z-index: 1;
            animation: floatIcon 3s ease-in-out infinite;
        }
        @keyframes floatIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .stencyl-card-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            padding: 5px 14px;
            border-radius: var(--radius-full);
            font-size: var(--font-size-xs);
            font-weight: 600;
            background-color: rgba(16, 185, 129, 0.9);
            color: white;
            letter-spacing: 0.02em;
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
            z-index: 1;
            backdrop-filter: blur(4px);
        }

        .stencyl-card-body {
            padding: 16px 18px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
            z-index: 1;
        }
        .stencyl-card-title {
            font-weight: 600;
            font-size: var(--font-size-md);
            line-height: var(--line-height-tight);
            letter-spacing: var(--letter-spacing-tight);
        }
        .stencyl-card-description {
            font-size: var(--font-size-sm);
            opacity: 0.75;
            line-height: var(--line-height-relaxed);
            flex: 1;
        }
        .stencyl-card-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: var(--font-size-xs);
            opacity: 0.7;
            flex-wrap: wrap;
        }
        .stencyl-card-meta span {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(255, 255, 255, 0.08);
            padding: 4px 10px;
            border-radius: var(--radius-full);
        }

        .stencyl-card-footer {
            padding: 14px 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: var(--font-size-xs);
            font-weight: 500;
            position: relative;
            z-index: 1;
        }
        .stencyl-card-platforms {
            display: flex;
            gap: 8px;
            opacity: 0.7;
            font-size: 1.1rem;
        }
        .stencyl-card-download {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--color-accent);
            padding: 8px 16px;
            border-radius: var(--radius-full);
            font-weight: 600;
            color: white;
            transition: all var(--transition-fast);
        }
        .stencyl-card:hover .stencyl-card-download {
            background: #3b82f6;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
        }

        /* ==================== КАРТОЧКА ПРОЕКТА ==================== */
        .card {
            background-color: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all var(--transition-slow);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            animation: cardFadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) backwards;
            position: relative;
            will-change: transform;
        }
        .card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-xl);
            border-color: var(--color-border-hover);
        }
        .card:active {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            transition: all 0.1s ease;
        }

        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Изображение карточки */
        .card-image {
            width: 100%;
            aspect-ratio: 16 / 10;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            position: relative;
            overflow: hidden;
            color: var(--color-text-tertiary);
        }
        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover .card-image img {
            transform: scale(1.06);
        }

        /* Бейдж категории */
        .card-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            padding: 5px 14px;
            border-radius: var(--radius-full);
            font-size: var(--font-size-xs);
            font-weight: 600;
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            color: var(--color-text);
            letter-spacing: 0.02em;
            box-shadow: var(--shadow-xs);
            transition: all var(--transition-fast);
        }
        .card:hover .card-badge {
            background-color: rgba(255, 255, 255, 0.95);
            box-shadow: var(--shadow-sm);
        }

        /* Тело карточки */
        .card-body {
            padding: 16px 18px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .card-title {
            font-weight: 600;
            font-size: var(--font-size-md);
            line-height: var(--line-height-tight);
            color: var(--color-text);
            letter-spacing: var(--letter-spacing-tight);
            max-height: 2.5em;
            overflow: hidden;
            word-break: break-word;
        }
        .card-description {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
            line-height: var(--line-height-relaxed);
            max-height: 2.8em;
            overflow: hidden;
            flex: 1;
            word-break: break-word;
        }
        .card-author {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: var(--font-size-xs);
            color: var(--color-text-tertiary);
            font-weight: 500;
            margin-top: auto;
        }
        .card-author-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #94a3b8, #64748b);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.6rem;
            flex-shrink: 0;
        }

        /* Подвал карточки */
        .card-footer {
            padding: 14px 18px;
            border-top: 1px solid var(--color-border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: var(--font-size-xs);
            color: var(--color-text-secondary);
            font-weight: 500;
        }
        .card-rating {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--color-warning);
            font-weight: 600;
            font-size: var(--font-size-sm);
        }
        .card-downloads {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--color-text-tertiary);
        }

        /* ==================== ПУСТОЕ СОСТОЯНИЕ ==================== */
        .empty-state {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 64px 32px;
            background-color: var(--color-surface);
            border: 2px dashed var(--color-border);
            border-radius: var(--radius-xl);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.6;
            transition: transform var(--transition-spring);
        }
        .empty-state:hover .empty-state-icon {
            transform: scale(1.08);
        }
        .empty-state-title {
            font-weight: 600;
            font-size: var(--font-size-xl);
            color: var(--color-text);
            margin-bottom: 8px;
            letter-spacing: var(--letter-spacing-tight);
        }
        .empty-state-text {
            color: var(--color-text-secondary);
            font-size: var(--font-size-base);
            max-width: 420px;
            line-height: var(--line-height-relaxed);
            margin-bottom: 20px;
        }
        .empty-state-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: var(--radius-full);
            font-weight: 600;
            font-size: var(--font-size-base);
            cursor: pointer;
            border: none;
            background-color: var(--color-accent);
            color: var(--color-text-inverse);
            font-family: inherit;
            transition: all var(--transition-fast);
            box-shadow: var(--shadow-accent);
            letter-spacing: 0.01em;
        }
        .empty-state-btn:hover {
            background-color: var(--color-accent-hover);
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }
        .empty-state-btn:active {
            transform: translateY(0);
            background-color: var(--color-accent-pressed);
        }

        /* ==================== ПОДВАЛ ==================== */
        .footer {
            text-align: center;
            padding: 22px 20px;
            color: var(--color-text-tertiary);
            font-size: var(--font-size-xs);
            border-top: 1px solid var(--color-border-light);
            background-color: var(--color-surface);
            letter-spacing: 0.02em;
        }
        .footer a {
            color: var(--color-accent);
            text-decoration: none;
            font-weight: 500;
            transition: color var(--transition-fast);
        }
        .footer a:hover {
            color: var(--color-accent-hover);
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        /* ==================== АДАПТИВНОСТЬ ==================== */
        @media (max-width: 768px) {
            :root {
                --header-height: 56px;
                --card-min-width: 240px;
            }
            .header-inner {
                padding: 0 12px;
                gap: 10px;
            }
            .logo-title {
                font-size: var(--font-size-md);
            }
            .logo-icon {
                width: 30px;
                height: 30px;
                font-size: 1rem;
            }
            .nav-link {
                padding: 7px 14px;
                font-size: var(--font-size-xs);
            }
            .catalog-grid {
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
                gap: 14px;
            }
            .page-title {
                font-size: var(--font-size-2xl);
            }
            .main {
                padding: 24px 12px 40px;
            }
            .card-body {
                padding: 12px 14px;
            }
            .card-footer {
                padding: 10px 14px;
            }
            .stencyl-card-image {
                font-size: 2.5rem;
            }
        }

        @media (max-width: 480px) {
            :root {
                --card-min-width: 160px;
            }
            .catalog-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .header-inner {
                flex-wrap: wrap;
                height: auto;
                padding: 10px 12px;
            }
            .nav {
                order: 3;
                width: 100%;
                justify-content: center;
            }
            .page-title {
                font-size: var(--font-size-xl);
            }
            .scroll-arrow {
                display: none;
            }
            .search-wrapper {
                max-width: 100%;
            }
        }

        /* ==================== УВАЖЕНИЕ К НАСТРОЙКАМ ПОЛЬЗОВАТЕЛЯ ==================== */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        @media (prefers-contrast: high) {
            .card, .stencyl-card {
                border-width: 2px;
            }
            .filter-chip {
                border-width: 2px;
            }
        }
    </style>
</head>
<body>
    <!-- ==================== ШАПКА ==================== -->
    <header class="header" id="header">
        <div class="header-inner">
            <a href="index.html" class="logo" aria-label="RUS Stencyl Forge — на главную">
                <span class="logo-icon" aria-hidden="true">🧩</span>
                <span class="logo-text">
                    <span class="logo-title">Stencyl Forge</span>
                    <span class="logo-badge">RUS 4.0.4</span>
                </span>
            </a>
            <nav class="nav" aria-label="Основная навигация">
                <a href="index.html" class="nav-link active" aria-current="page">📚 Каталог</a>
                <a href="upload.html" class="nav-link accent">⬆️ Поделиться</a>
                <button class="btn-login" id="btnLogin" onclick="handleAuthClick()" aria-label="Войти в аккаунт">
                    👤 Войти
                </button>
            </nav>
        </div>
    </header>

    <!-- ==================== ОСНОВНОЙ КОНТЕНТ ==================== -->
    <main class="main" id="mainContent">
        <div class="container">
            <div class="page-header">
                <h1 class="page-title">Каталог ресурсов</h1>
                <p class="page-subtitle">Бесплатные актёры, тайлсеты, поведения и проекты для Stencyl 4.0.4 от русскоязычного сообщества разработчиков</p>
            </div>

            <!-- Поиск -->
            <div class="search-wrapper">
                <input 
                    type="search" 
                    class="search-input" 
                    id="searchInput" 
                    placeholder="Поиск по названию или описанию..."
                    autocomplete="off"
                    aria-label="Поиск по каталогу"
                >
                <span class="search-icon" aria-hidden="true">🔍</span>
            </div>

            <!-- Фильтры -->
            <div class="filters-wrapper" id="filtersWrapper">
                <button class="scroll-arrow left" id="scrollLeft" aria-label="Прокрутить фильтры влево" title="Прокрутить влево">‹</button>
                <div class="filters-scroll hide-scrollbar" id="filtersScroll" role="tablist" aria-label="Фильтры по категориям">
                    <button class="filter-chip active" data-filter="all" role="tab" aria-selected="true">
                        Все<span class="filter-count" id="cntAll">0</span>
                    </button>
                    <button class="filter-chip" data-filter="stencyl" role="tab" aria-selected="false">
                        🧩 Stencyl<span class="filter-count" id="cntStencyl">1</span>
                    </button>
                    <button class="filter-chip" data-filter="actors" role="tab" aria-selected="false">
                        👾 Актёры<span class="filter-count" id="cntActors">0</span>
                    </button>
                    <button class="filter-chip" data-filter="tilesets" role="tab" aria-selected="false">
                        🗺️ Тайлсеты<span class="filter-count" id="cntTilesets">0</span>
                    </button>
                    <button class="filter-chip" data-filter="behaviors" role="tab" aria-selected="false">
                        🧠 Поведения<span class="filter-count" id="cntBehaviors">0</span>
                    </button>
                    <button class="filter-chip" data-filter="projects" role="tab" aria-selected="false">
                        📦 Проекты<span class="filter-count" id="cntProjects">0</span>
                    </button>
                    <button class="filter-chip" data-filter="packs" role="tab" aria-selected="false">
                        📚 Сборки<span class="filter-count" id="cntPacks">0</span>
                    </button>
                </div>
                <button class="scroll-arrow right" id="scrollRight" aria-label="Прокрутить фильтры вправо" title="Прокрутить вправо">›</button>
            </div>

            <!-- Сетка каталога -->
            <div class="catalog-grid" id="catalogGrid" role="list" aria-label="Список ресурсов">
                <!-- Заполняется динамически -->
            </div>
        </div>
    </main>

    <!-- ==================== ПОДВАЛ ==================== -->
    <footer class="footer">
        <p>RUS Stencyl Forge v4.0.4 · <a href="upload.html">Поделиться ресурсом</a> · Сделано с ❤️ для сообщества</p>
    </footer>

    <script>
        // ==================== ГЛОБАЛЬНОЕ СОСТОЯНИЕ ====================
        let currentUser = null;
        let activeFilter = 'all';
        let searchQuery = '';
        let allProjects = []; // Заполняется из папок .RSF

        // ==================== КАРТОЧКА УСТАНОВКИ STENCYL ====================
        const stencylCard = {
            id: 'stencyl-install',
            folder: 'stencyl-install',
            name: 'Stencyl 4.0.4',
            description: 'Скачайте и установите последнюю версию Stencyl для Windows. macOS и Linux — скоро.',
            category: 'stencyl',
            author: 'Stencyl Team',
            tags: ['stencyl', 'установка', 'windows'],
            iconUrl: null, // Используем встроенную иконку
            fileUrl: 'https://drive.google.com/uc?export=download&id=1t09Lj4t5ft7YCkvmlmYl7hi-RpcRdmuI',
            rating: 5.0,
            downloads: 9999,
            isStencyl: true // Флаг особой карточки
        };

        // ==================== FIREBASE AUTH ====================
        function handleAuthClick() {
            if (currentUser) {
                auth.signOut().catch(console.error);
            } else {
                window.location.href = 'login.html';
            }
        }

        function updateAuthUI(user) {
            currentUser = user;
            const btn = document.getElementById('btnLogin');
            if (!btn) return;

            if (user) {
                const displayName = user.displayName || user.email || 'Пользователь';
                const initial = displayName[0].toUpperCase();
                btn.innerHTML = `<span class="user-dot" aria-hidden="true">${initial}</span> ${displayName}`;
                btn.classList.add('logged-in');
                btn.setAttribute('aria-label', `Профиль: ${displayName}. Нажмите, чтобы выйти.`);
            } else {
                btn.innerHTML = '👤 Войти';
                btn.classList.remove('logged-in');
                btn.setAttribute('aria-label', 'Войти в аккаунт');
            }
        }

        // Следим за авторизацией
        auth.onAuthStateChanged((user) => {
            updateAuthUI(user);
        });

        // ==================== ПОЛУЧЕНИЕ СПИСКА ПАПОК .RSF ====================
        async function fetchRSFProjects() {
            try {
                // Запрашиваем список папок через Cloudflare Worker
                const response = await fetch('/api/rsf-list');
                
                if (!response.ok) {
                    throw new Error(`Ошибка HTTP: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (!Array.isArray(data)) {
                    throw new Error('Неверный формат данных от сервера');
                }
                
                const projects = data.map(project => ({
                    id: project.folder.replace('.RSF', '').replace(/\s+/g, '-').toLowerCase(),
                    folder: project.folder,
                    name: project.name || project.folder.replace('.RSF', ''),
                    description: project.description || '',
                    category: project.category || 'unknown',
                    author: project.author || 'Неизвестный автор',
                    tags: project.tags || [],
                    iconUrl: `/${encodeURIComponent(project.folder)}/icon.png`,
                    fileUrl: `/${encodeURIComponent(project.folder)}/res.png`,
                    rating: project.rating || 0,
                    downloads: project.downloads || 0,
                    isStencyl: false
                }));
                
                // Добавляем карточку Stencyl в начало списка
                return [stencylCard, ...projects];
                
            } catch (error) {
                console.warn('Не удалось загрузить каталог через Worker:', error.message);
                console.info('Использую резервный список проектов');
                return [stencylCard, ...getFallbackProjects()];
            }
        }

        // Резервный список (когда Worker недоступен)
        function getFallbackProjects() {
            return [];
        }

        // ==================== ОТРИСОВКА КАТАЛОГА ====================
        function renderProjects(projects) {
            const grid = document.getElementById('catalogGrid');
            if (!grid) return;

            // Фильтрация
            let filtered = [...projects];
            
            if (activeFilter !== 'all') {
                filtered = filtered.filter(p => p.category === activeFilter);
            }
            
            if (searchQuery.trim()) {
                const query = searchQuery.toLowerCase().trim();
                filtered = filtered.filter(p => 
                    p.name.toLowerCase().includes(query) ||
                    p.description.toLowerCase().includes(query) ||
                    (p.tags && p.tags.some(tag => tag.toLowerCase().includes(query)))
                );
            }

            // Обновление счётчиков в фильтрах
            updateFilterCounts(projects);

            // Пустое состояние
            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" role="status">
                        <div class="empty-state-icon" aria-hidden="true">📭</div>
                        <p class="empty-state-title">
                            ${activeFilter === 'stencyl' ? 'Страница Stencyl' : 'Ничего не найдено'}
                        </p>
                        <p class="empty-state-text">
                            ${activeFilter === 'stencyl' 
                                ? 'Карточка установки Stencyl должна быть видна всегда.' 
                                : 'По вашему запросу ничего не найдено. Попробуйте изменить фильтры или поисковый запрос.'}
                        </p>
                    </div>
                `;
                return;
            }

            // Отрисовка карточек
            grid.innerHTML = filtered.map((project, index) => {
                const animationDelay = Math.min(index * 0.05, 0.5);
                
                // Особая карточка для Stencyl
                if (project.isStencyl) {
                    return `
                        <a href="${project.fileUrl}" 
                           class="stencyl-card" 
                           role="listitem"
                           style="animation-delay: ${animationDelay}s;"
                           aria-label="Скачать Stencyl 4.0.4 для Windows (102 МБ)"
                           download>
                            <div class="stencyl-card-image" aria-hidden="true">🧩</div>
                            <span class="stencyl-card-badge">⚡ Установить</span>
                            <div class="stencyl-card-body">
                                <h3 class="stencyl-card-title">Stencyl 4.0.4</h3>
                                <p class="stencyl-card-description">Скачайте и установите последнюю версию Stencyl для Windows. macOS и Linux — скоро.</p>
                                <div class="stencyl-card-meta">
                                    <span>🪟 Windows</span>
                                    <span>💾 102 МБ</span>
                                    <span>⭐ 5.0</span>
                                </div>
                            </div>
                            <div class="stencyl-card-footer">
                                <div class="stencyl-card-platforms">
                                    <span title="Windows">🪟</span>
                                    <span title="macOS (скоро)" style="opacity:0.4;">🍎</span>
                                    <span title="Linux (скоро)" style="opacity:0.4;">🐧</span>
                                </div>
                                <span class="stencyl-card-download">📥 Скачать</span>
                            </div>
                        </a>
                    `;
                }
                
                // Обычная карточка проекта
                const categoryEmoji = getCategoryEmoji(project.category);
                const categoryName = getCategoryName(project.category);
                const authorInitial = (project.author || '?')[0].toUpperCase();
                const safeName = escapeHtml(project.name);
                const safeDesc = escapeHtml(project.description || 'Описание скоро появится...');
                const safeAuthor = escapeHtml(project.author || 'Неизвестный автор');

                return `
                    <a href="project.html?folder=${encodeURIComponent(project.folder)}" 
                       class="card" 
                       role="listitem"
                       style="animation-delay: ${animationDelay}s;"
                       aria-label="${safeName} — ${categoryName}. Автор: ${safeAuthor}. Рейтинг: ${project.rating.toFixed(1)}.">
                        <div class="card-image">
                            ${project.iconUrl 
                                ? `<img src="${project.iconUrl}" alt="${safeName}" loading="lazy" onerror="this.parentElement.innerHTML='📦'">` 
                                : '📦'}
                            <span class="card-badge">${categoryEmoji} ${categoryName}</span>
                        </div>
                        <div class="card-body">
                            <h3 class="card-title">${safeName}</h3>
                            <p class="card-description">${safeDesc}</p>
                            <div class="card-author">
                                <span class="card-author-dot" aria-hidden="true">${authorInitial}</span>
                                <span>${safeAuthor}</span>
                            </div>
                        </div>
                        <div class="card-footer">
                            <span class="card-rating" aria-label="Рейтинг: ${project.rating.toFixed(1)} из 5">
                                ⭐ ${project.rating.toFixed(1)}
                            </span>
                            <span class="card-downloads" aria-label="Скачиваний: ${project.downloads}">
                                📥 ${project.downloads}
                            </span>
                        </div>
                    </a>
                `;
            }).join('');
        }

        function updateFilterCounts(projects) {
            const counts = {
                all: projects.length,
                stencyl: projects.filter(p => p.category === 'stencyl').length,
                actors: projects.filter(p => p.category === 'actors').length,
                tilesets: projects.filter(p => p.category === 'tilesets').length,
                behaviors: projects.filter(p => p.category === 'behaviors').length,
                projects: projects.filter(p => p.category === 'projects').length,
                packs: projects.filter(p => p.category === 'packs').length
            };

            const elements = {
                all: document.getElementById('cntAll'),
                stencyl: document.getElementById('cntStencyl'),
                actors: document.getElementById('cntActors'),
                tilesets: document.getElementById('cntTilesets'),
                behaviors: document.getElementById('cntBehaviors'),
                projects: document.getElementById('cntProjects'),
                packs: document.getElementById('cntPacks')
            };

            Object.entries(elements).forEach(([key, el]) => {
                if (el) el.textContent = counts[key];
            });
        }

        // ==================== ФИЛЬТРЫ ====================
        function initFilters() {
            const filtersContainer = document.getElementById('filtersScroll');
            if (!filtersContainer) return;

            // Один обработчик на весь контейнер (делегирование)
            filtersContainer.addEventListener('click', function(event) {
                const chip = event.target.closest('.filter-chip');
                if (!chip) return;

                // Снимаем active со ВСЕХ чипов внутри контейнера
                const allChips = this.querySelectorAll('.filter-chip');
                allChips.forEach(c => {
                    c.classList.remove('active');
                    c.setAttribute('aria-selected', 'false');
                });

                // Ставим active на тот, по которому кликнули
                chip.classList.add('active');
                chip.setAttribute('aria-selected', 'true');

                // Запоминаем выбранный фильтр
                activeFilter = chip.dataset.filter;

                // Перерисовываем каталог с новым фильтром
                renderProjects(allProjects);

                // Плавно прокручиваем чип в центр экрана
                chip.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            });
        }

        // ==================== ПОИСК ====================
        function initSearch() {
            const searchInput = document.getElementById('searchInput');
            if (!searchInput) return;

            let debounceTimer;
            
            searchInput.addEventListener('input', function() {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    searchQuery = this.value;
                    renderProjects(allProjects);
                }, 300);
            });

            // Очистка по Escape
            searchInput.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    this.value = '';
                    searchQuery = '';
                    renderProjects(allProjects);
                    this.blur();
                }
            });
        }

        // ==================== ПРОКРУТКА ФИЛЬТРОВ ====================
        function initScrollArrows() {
            const scrollContainer = document.getElementById('filtersScroll');
            const leftArrow = document.getElementById('scrollLeft');
            const rightArrow = document.getElementById('scrollRight');
            
            if (!scrollContainer || !leftArrow || !rightArrow) return;

            function updateArrowVisibility() {
                const canScrollLeft = scrollContainer.scrollLeft > 5;
                const canScrollRight = scrollContainer.scrollLeft < (scrollContainer.scrollWidth - scrollContainer.clientWidth - 5);
                
                leftArrow.classList.toggle('visible', canScrollLeft);
                rightArrow.classList.toggle('visible', canScrollRight);
            }

            leftArrow.addEventListener('click', () => {
                scrollContainer.scrollBy({ left: -250, behavior: 'smooth' });
            });

            rightArrow.addEventListener('click', () => {
                scrollContainer.scrollBy({ left: 250, behavior: 'smooth' });
            });

            scrollContainer.addEventListener('scroll', updateArrowVisibility, { passive: true });
            window.addEventListener('resize', updateArrowVisibility, { passive: true });
            
            // Первичная проверка
            setTimeout(updateArrowVisibility, 100);
        }

        // ==================== ТЕНЬ ШАПКИ ПРИ ПРОКРУТКЕ ====================
        function initHeaderShadow() {
            const header = document.getElementById('header');
            if (!header) return;

            window.addEventListener('scroll', () => {
                if (window.scrollY > 10) {
                    header.classList.add('scrolled');
                } else {
                    header.classList.remove('scrolled');
                }
            }, { passive: true });
        }

        // ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================
        function getCategoryName(category) {
            const names = {
                'stencyl': 'Установка',
                'actors': 'Актёр',
                'tilesets': 'Тайлсет',
                'behaviors': 'Поведение',
                'projects': 'Проект',
                'packs': 'Сборка',
                'sounds': 'Звук',
                'backgrounds': 'Фон',
                'unknown': 'Другое'
            };
            return names[category] || 'Другое';
        }

        function getCategoryEmoji(category) {
            const emojis = {
                'stencyl': '🧩',
                'actors': '👾',
                'tilesets': '🗺️',
                'behaviors': '🧠',
                'projects': '📦',
                'packs': '📚',
                'sounds': '🎵',
                'backgrounds': '🖼️',
                'unknown': '📄'
            };
            return emojis[category] || '📄';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        async function init() {
            initFilters();
            initSearch();
            initScrollArrows();
            initHeaderShadow();
            
            // Загружаем проекты
            allProjects = await fetchRSFProjects();
            renderProjects(allProjects);
        }

        // Запуск при загрузке DOM
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
